# User Configuration Example
# Copy this to data/user_config.yaml and customize
# The onboarding wizard will generate this automatically

user:
  name: "Your Name"
  age: 30
  experience_level: "intermediate" # beginner, intermediate, advanced

# Sport configuration
sports:
  - name: "boxing"
    config_file: "configs/sports/boxing.yaml"
    primary: true
    experience_years: 2
    current_phase: "strength" # base_building, strength, power_speed, technique, fight_camp, recovery
    phase_start_date: "2026-02-01"
    phase_end_date: "2026-03-15"

  # Example: Multi-sport athlete
  # - name: "running"
  #   config_file: "configs/sports/running.yaml"
  #   primary: false
  #   experience_years: 5

# Available equipment and training locations
# You can have any combination:
#   - Home only (list home equipment, leave gyms empty)
#   - Gyms/clubs only (leave home empty, add gyms)
#   - Outdoors only (leave both empty, track outdoor sessions manually)
#   - Any combination of the above
equipment:
  home:
    - "Heavy bag"
    - "Speed bag"
    - "Jump rope"
    - "Barbell and plates"
    - "Dumbbells (up to 50lbs)"
    - "Pull-up bar"
    # For gym-only or outdoors-only training, leave this list empty: []

  # Multiple gyms/clubs with their scheduled sessions
  # For home-only or outdoors-only training, leave this list empty: []
  gyms:
    - name: "Local Boxing Gym"
      type: "boxing_club"
      membership: "unlimited"
      available_days: ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"]
      sessions:
        - name: "Bag Work"
          description: "Open heavy bag work with variety of bag types and focuses"
          occurrences: "Tuesdays (12pm & 6pm) and Thursday (6pm), 60 min each"
          cost: "included"

        - name: "Boxing Class"
          description: "Technical drilling with partner work and combinations"
          occurrences: "Wednesday and Friday at 7pm, 60 min"
          cost: "included"

        - name: "Ringcraft"
          description: "Movement and ring positioning drills"
          occurrences: "Saturday morning at 10am, 60 min"
          cost: "included"

        - name: "Sparring"
          description: "Light to moderate sparring with partner rotation. Need to book in advance, limited spots"
          occurrences: "Wednesday 7pm, 45 min"
          cost: "$10"

# Weekly availability
# For each day, specify when you're available and where you prefer to workout
# preferred_location options: "home", "gym", "flexible"
availability:
  Monday:
    morning: true # 6-9am
    lunch: false # 12-2pm
    evening: true # 6-9pm
    preferred_location: "home" # Prefer home workouts this day
    notes: ""

  Tuesday:
    morning: false
    lunch: false
    evening: true # Club session at 6pm
    preferred_location: "gym" # At office, prefer gym near work
    notes: "Club bag work session"

  Wednesday:
    morning: true
    lunch: false
    evening: true
    preferred_location: "gym" # Gym day for club sessions
    notes: "Optional sparring session"

  Thursday:
    morning: false
    lunch: false
    evening: true
    preferred_location: "gym" # Club boxing class
    notes: "Club boxing class"

  Friday:
    morning: true
    lunch: false
    evening: false
    preferred_location: "home" # Work from home, prefer home workout
    notes: "Prefer lighter day"

  Saturday:
    morning: true # Club session
    lunch: true
    evening: false
    preferred_location: "flexible" # Weekend, flexible location
    notes: "Ringcraft class at 10am"

  Sunday:
    morning: true
    lunch: true
    evening: false
    preferred_location: "home" # Rest day, light home workout if any
    notes: "Prefer rest or active recovery"

# Goals
goals:
  short_term: # 1-3 months
    - "Master jab-cross-hook combination"
    - "Increase 3-minute round heavy bag endurance to 8 rounds"
    - "Improve defensive head movement"

  medium_term: # 3-6 months
    - "Compete in first amateur bout"
    - "Deadlift 2x bodyweight"
    - "Comfortable with regular sparring"

  long_term: # 6-12 months
    - "Win first amateur fight"
    - "Develop signature combinations"
    - "Become advanced-level boxer"

# Fitness baseline (optional, from fitness assessment)
fitness:
  cardio:
    resting_heart_rate: 60
    vo2_max_estimate: null
    notes: "Can run 5k comfortably"

  strength:
    squat_1rm: 225
    deadlift_1rm: 275
    bench_1rm: 185
    overhead_press_1rm: 115
    notes: ""

  boxing_specific:
    max_rounds_heavy_bag: 6
    max_rounds_sparring: 3
    comfortable_sparring_pace: "light-to-moderate"
    notes: "Hand speed improving, defense needs work"

# Nutrition preferences
nutrition:
  approach: "balanced" # balanced, low-carb, high-protein, etc.
  dietary_restrictions:
    - "None"
    # - "Vegetarian"
    # - "Gluten-free"

  daily_targets:
    calories: 2800
    protein_grams: 180
    notes: "Tracking loosely, not strictly"

  supplements:
    - name: "Creatine"
      dosage: "5g daily"
      timing: "post-workout"

    - name: "Protein powder"
      dosage: "1 scoop"
      timing: "post-workout"

    - name: "Fish oil"
      dosage: "2g daily"
      timing: "with meal"

    - name: "Vitamin D"
      dosage: "2000 IU"
      timing: "morning"

# Training preferences
preferences:
  preferred_session_times:
    - "early morning (6-8am)"
    - "evening (6-8pm)"

  session_duration_preference: "60-75 minutes"

  intensity_preference: "moderate-to-high" # conservative, moderate, moderate-to-high, aggressive

  recovery_priority: "balanced" # aggressive, balanced, conservative

  plan_frequency: "weekly" # weekly, bi-weekly, monthly

  notes: |
    - Prefer boxing sessions over pure conditioning
    - Want to sparring 1-2x per week max
    - Morning workouts on weekends preferred
    - Need to balance with full-time work schedule

# AI Coach settings
coach:
  model: "claude-3-5-sonnet-20241022" # or claude-3-opus-20240229 for higher quality
  temperature: 0.7
  coaching_style: "balanced" # aggressive, balanced, supportive
  explanation_detail: "moderate" # brief, moderate, detailed

# Tracking
tracking:
  history_months: 6 # how many months of history to consider
  track_nutrition: true
  track_supplements: true
  track_sleep: false # future feature
  track_weight: false # future feature
