<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="#0a0e12" rx="80"/>

  <!-- Accent circle -->
  <circle cx="256" cy="256" r="200" fill="#1f2937" opacity="0.5"/>

  <!-- Main icon - Stylized fist/strength symbol -->
  <g transform="translate(256, 256)">
    <!-- Fist shape -->
    <path d="M -60 -80 L -80 -40 L -80 20 L -60 60 L 60 60 L 80 20 L 80 -40 L 60 -80 Z"
          fill="#ef4444" stroke="#dc2626" stroke-width="4"/>

    <!-- Knuckle details -->
    <rect x="-70" y="-20" width="20" height="40" rx="4" fill="#dc2626"/>
    <rect x="-40" y="-30" width="20" height="50" rx="4" fill="#dc2626"/>
    <rect x="-10" y="-25" width="20" height="45" rx="4" fill="#dc2626"/>
    <rect x="20" y="-30" width="20" height="50" rx="4" fill="#dc2626"/>
    <rect x="50" y="-20" width="20" height="40" rx="4" fill="#dc2626"/>

    <!-- Highlight -->
    <ellipse cx="0" cy="-40" rx="30" ry="20" fill="#ffffff" opacity="0.2"/>
  </g>

  <!-- Text - IF (IamFeel) -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="80" font-weight="900"
        text-anchor="middle" fill="#ef4444">IF</text>
</svg>
